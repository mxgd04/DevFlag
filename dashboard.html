<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevFlag – Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">&lt;/&gt;</div>
      <div class="logo-text">Dev<span>Flag</span></div>
    </div>

    <nav class="nav">
      <a href="index.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/>
        </svg>
        Home
      </a>
      <a href="dashboard.html" class="nav-item active">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
        </svg>
        Dashboard
      </a>
      <a href="ranking.html" class="nav-item">
        <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
        </svg>
        Ranking
      </a>
    </nav>

    <div class="sidebar-footer">
      <a href="login.html" class="btn-auth btn-login">Login</a>
      <a href="signup.html" class="btn-auth btn-register">Register</a>
    </div>
  </aside>

  <main class="main">

    <header class="topbar">
      <div class="breadcrumb">
        <a href="index.html" class="home-link">Home</a>
        <span class="breadcrumb-sep">/</span>
        <strong>Dashboard</strong>
      </div>
    </header>

    <div class="dash-stats">

      <div class="stat-card">
        <div class="stat-icon stat-icon--blue">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M14.5 10c-.83 0-1.5-.67-1.5-1.5v-5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5z"/>
            <path d="M20.5 10H19V8.5c0-.83.67-1.5 1.5-1.5s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
            <path d="M9.5 14c.83 0 1.5.67 1.5 1.5v5c0 .83-.67 1.5-1.5 1.5S8 21.33 8 20.5v-5c0-.83.67-1.5 1.5-1.5z"/>
            <path d="M3.5 14H5v1.5c0 .83-.67 1.5-1.5 1.5S2 16.33 2 15.5 2.67 14 3.5 14z"/>
            <path d="M14 14.5c0-.83.67-1.5 1.5-1.5h5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-5c-.83 0-1.5-.67-1.5-1.5z"/>
            <path d="M15.5 19H14v1.5c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5-.67-1.5-1.5-1.5z"/>
            <path d="M10 9.5C10 8.67 9.33 8 8.5 8h-5C2.67 8 2 8.67 2 9.5S2.67 11 3.5 11h5c.83 0 1.5-.67 1.5-1.5z"/>
            <path d="M8.5 5H10V3.5C10 2.67 9.33 2 8.5 2S7 2.67 7 3.5 7.67 5 8.5 5z"/>
          </svg>
        </div>
        <div class="stat-info">
          <div class="stat-value">24</div>
          <div class="stat-label">Challenges Completed</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon stat-icon--green">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <div class="stat-info">
          <div class="stat-value">12,400 <span class="stat-unit">XP</span></div>
          <div class="stat-label">Total Points</div>
        </div>
      </div>

      <div class="stat-card">
        <div class="stat-icon stat-icon--orange">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/>
          </svg>
        </div>
        <div class="stat-info">
          <div class="stat-value">#42</div>
          <div class="stat-label">Global Ranking</div>
        </div>
      </div>
    </div>

    <div class="dash-grid"> 
        <div class="dash-panel">
        <div class="panel-header">
          <span class="panel-title">Progress by Category</span>
        </div>
        <ul class="progress-list">
          <li class="progress-item">
            <div class="progress-top">
              <span class="progress-label">Reversing</span>
              <span class="progress-pct">72%</span>
            </div>
            <div class="progress-track">
              <div class="progress-bar progress-bar--blue" style="width: 72%"></div>
            </div>
          </li>
          <li class="progress-item">
            <div class="progress-top">
              <span class="progress-label">Steganography</span>
              <span class="progress-pct">58%</span>
            </div>
            <div class="progress-track">
              <div class="progress-bar progress-bar--green" style="width: 58%"></div>
            </div>
          </li>
          <li class="progress-item">
            <div class="progress-top">
              <span class="progress-label">Cryptography</span>
              <span class="progress-pct">20%</span>
            </div>
            <div class="progress-track">
              <div class="progress-bar progress-bar--red" style="width: 20%"></div>
            </div>
        </li>
        </ul>
      </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
