<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevFlag – Sign Up</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body>
  <div class="bg-grid"></div>
    <div class="auth-form-wrap">

      <div class="mobile-logo">
        <div class="logo-icon">&lt;/&gt;</div>
        <div class="logo-text">Dev<span>Flag</span></div>
      </div>

      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>

      <form action="#" method="post" onsubmit="return false;">
        
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input type="text" id="username" name="username" placeholder="h4ck3r_42" autocomplete="username" required />
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <polyline points="16 18 22 12 16 6"/>
              <polyline points="8 6 2 12 8 18"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap has-toggle">
            <input type="password" id="password" name="password" placeholder="••••••••"
                   autocomplete="new-password" required oninput="checkStrength(this.value)" />
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>

        <div class="form-group">
          <label for="confirm">Confirm Password</label>
          <div class="input-wrap has-toggle">
            <input type="password" id="confirm" name="confirm" placeholder="••••••••" autocomplete="new-password" required />
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>
        </div>

        <button type="submit" class="btn-submit">CREATE ACCOUNT</button>
      </form>

</body>
</html>
